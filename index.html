<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Tic Tac Toe</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  padding: 30px;
  background: rgba(30,41,59,0.7);
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

h1 {
  margin-bottom: 30px;
  font-size: 2rem;
}

button {
  display: block;
  width: 240px;
  margin: 12px auto;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: black;
  font-weight: bold;
  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #4ade80, #15803d);
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>Ultimate Tic Tac Toe</h1>

  <button onclick="goLocal()">Pass & Play</button>
  <button onclick="goMultiplayer()">Multiplayer</button>
  <button onclick="goSandbox()">Sandbox Mode</button>
  <button onclick="goRules()">How to Play</button>

  <div class="footer">Play with friends • Built for fun 🎮</div>
</div>

<script>
function goLocal() {
  window.location.href = "local.html";
}

function goMultiplayer() {
  window.location.href = "join.html";
}

function goSandbox() {
  window.location.href = "sandbox.html";
}

function goRules() {
  window.location.href = "rules.html";
}
</script>

</body>
</html>

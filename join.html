<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Multiplayer</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/566/566294.png">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 300px;
  text-align: center;
  background: rgba(30,41,59,0.8);
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

h2 {
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 15px;
  text-align: left;
}

label {
  font-size: 13px;
  opacity: 0.8;
}

input {
  width: 100%;
  margin-top: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #020617;
  color: white;
  outline: none;
  transition: 0.2s;
}

input:focus {
  box-shadow: 0 0 8px #22c55e;
}

.error {
  color: #f87171;
  font-size: 12px;
  height: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  background: linear-gradient(135deg, #4ade80, #15803d);
}

.secondary {
  background: #334155;
  color: white;
}

.secondary:hover {
  background: #475569;
}

.tip {
  font-size: 12px;
  margin-top: 10px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h2>Join Multiplayer</h2>

  <div class="input-group">
    <label>Username</label>
    <input id="username" placeholder="e.g. soumil">
    <div id="userError" class="error"></div>
  </div>

  <div class="input-group">
    <label>Room ID</label>
    <input id="room" placeholder="e.g. ABC123">
    <div id="roomError" class="error"></div>
  </div>

  <button id="joinBtn">Join Game</button>
  <button id="backBtn" class="secondary">Back</button>

  <div class="tip">Tip: Share the same room ID with your friend</div>
</div>

<script>
const usernameInput = document.getElementById("username");
const roomInput = document.getElementById("room");

const userError = document.getElementById("userError");
const roomError = document.getElementById("roomError");

document.getElementById("joinBtn").onclick = joinGame;
document.getElementById("backBtn").onclick = goHome;

// press Enter to join
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") joinGame();
});

function joinGame() {
  const user = usernameInput.value.trim();
  const room = roomInput.value.trim().toUpperCase();

  // clear errors
  userError.textContent = "";
  roomError.textContent = "";

  let valid = true;

  if (!user) {
    userError.textContent = "Username required";
    valid = false;
  }

  if (!room) {
    roomError.textContent = "Room ID required";
    valid = false;
  }

  if (!valid) return;

  const url = `multiplayer.html?room=${room}&user=${encodeURIComponent(user)}`;
  window.location.href = url;
}

function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
